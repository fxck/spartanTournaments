zerops:
  # ── dev ───────────────────────────────────────────────────────────
  # Used by appdev (zeropsSetup: dev). Self-deploy → deployFiles MUST be [.].
  # No --max-old-space-size: Node 22 auto-sizes the heap from the cgroup limit.
  # No health checks on dev — they belong on prod only.
  - setup: dev
    build:
      base: nodejs@22
      buildCommands:
        - pnpm i
        - pnpm run build
      deployFiles:
        - .
    run:
      base: nodejs@22
      envVariables:
        DATABASE_URL: ${db_connectionString}/${db_dbName}
        NODE_ENV: development
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        - ./node_modules/.bin/drizzle-kit migrate
      start: node dist/analog/server/index.mjs

  # ── prod ──────────────────────────────────────────────────────────
  # Used by appstage + the recipe's app / appstage services (zeropsSetup: prod).
  # Cross-deploy / buildFromGit, so deployFiles cherry-picks the build output.
  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        - pnpm i
        - pnpm run build
      deployFiles:
        - dist                # compiled Nitro SSR server (self-contained)
        - node_modules        # needed by the drizzle-kit migrate init step
        - drizzle             # SQL migration files applied on boot
        - drizzle.config.ts   # drizzle-kit config (reads DATABASE_URL)
        - package.json        # drizzle-kit module-resolution context
    deploy:
      readinessCheck:         # gates deploy cutover until GET /health answers
        httpGet:
          port: 3000
          path: /health
    run:
      base: nodejs@22
      envVariables:
        DATABASE_URL: ${db_connectionString}/${db_dbName}
        NODE_ENV: production
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        - ./node_modules/.bin/drizzle-kit migrate
      start: node dist/analog/server/index.mjs
      healthCheck:            # continuous; LB drops/restarts a container that stops answering
        httpGet:
          port: 3000
          path: /health
